[build]
target = "../x86_64-huesos-userspace.json"

[target.x86_64-huesos-userspace]
rustflags = [
    "-C", "link-arg=-T../user_linker.ld",
    "-C", "link-arg=-no-pie",
    "-C", "relocation-model=static",
]

[unstable]
build-std = ["core", "compiler_builtins"]
build-std-features = ["compiler-builtins-mem"]
json-target-spec = true
