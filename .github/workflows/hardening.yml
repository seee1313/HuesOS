name: HuesOS hardening

on:
  push:
    branches: [main, "huesos-dev/**", "huesos-dev-**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: hardening-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-safety:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: |
          rustup toolchain install nightly-2026-03-01 --profile minimal \
            --component rust-src,rustfmt,clippy,llvm-tools-preview
          rustup default nightly-2026-03-01
      - name: Enforce safety regression budget
        run: python3 tools/check-safety-budget.py
      - name: Clippy
        env:
          CARGO_BUILD_JOBS: "1"
        run: make clippy
      - name: Host tests
        env:
          CARGO_BUILD_JOBS: "1"
        run: make test

  qemu-boot:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        profile: [debug, release]
        cpus: [1, 2]
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            gcc xorriso qemu-system-x86
      - name: Install Rust toolchain
        run: |
          rustup toolchain install nightly-2026-03-01 --profile minimal \
            --component rust-src,llvm-tools-preview
          rustup default nightly-2026-03-01
      - name: Boot QEMU
        env:
          CARGO_BUILD_JOBS: "1"
          ARTIFACT_DIR: ci-artifacts
        run: bash scripts/ci-qemu-smoke.sh ${{ matrix.profile }} ${{ matrix.cpus }} 120
      - name: Upload serial log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-${{ matrix.profile }}-smp${{ matrix.cpus }}
          path: ci-artifacts/
          if-no-files-found: warn
